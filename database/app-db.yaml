apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: app-db
  namespace: database
spec:
  instances: 3
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:14.18-0.3.0
  enableSuperuserAccess: true
  primaryUpdateMethod: switchover

  postgresql:
    shared_preload_libraries:
      - "vchord.so"

  managed:
    services:
      additional:
        - selectorType: ro
          serviceTemplate:
            metadata:
              name: app-db-ro-lan
              annotations:
                metallb.universe.tf/loadBalancerIPs: 192.168.4.105
            spec:
              type: LoadBalancer

  storage:
    storageClass: local-path
    size: 20Gi

  monitoring:
    enablePodMonitor: true

  backup:
    retentionPolicy: "14d"
    barmanObjectStore:
      destinationPath: s3://cnpg-backups
      serverName: app-db-2
      endpointURL: https://s3.eu-central-003.backblazeb2.com
      wal:
        compression: bzip2
      s3Credentials:
        accessKeyId:
          name: database-backblaze
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: database-backblaze
          key: SECRET_ACCESS_KEY

  bootstrap:
    recovery:
      backup:
        name: daily-backup-20250608000000
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: daily-backup
  namespace: database
spec:
  schedule: "@daily"
  cluster:
    name: app-db
