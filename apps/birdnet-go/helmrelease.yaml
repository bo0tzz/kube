apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: birdnet-go
  namespace: applications
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 5.0.0
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: applications

  values:
    controllers:
      birdnet-go:
        containers:
          app:
            image:
              repository: ghcr.io/tphakala/birdnet-go
              tag: nightly-20260502@sha256:4468398cd09d87a35f268d6a6b2d48c01fbff26c37f45b0d99069607e1f9144e
            env:
              TZ: Europe/Amsterdam

    service:
      app:
        controller: birdnet-go
        ports:
          http:
            port: 8080

    ingress:
      app:
        annotations:
          kubernetes.io/ingress.class: nginx-internal
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - host: &hostname birds.zijlein.de
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *hostname
            secretName: birdnet-go-tls

    persistence:
      data:
        existingClaim: birdnet-go-data
        globalMounts:
          - path: /config
            subPath: config
          - path: /data
            subPath: data
